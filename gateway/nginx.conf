worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/json;
    sendfile        on;
    keepalive_timeout  65;

    # Global Nginx Server Block (API Gateway on Port 80)
    server {
        listen 80;
        server_name localhost;

        # Standard CORS headers configuration helper
        proxy_hide_header Access-Control-Allow-Origin;
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

        # Preflight OPTIONS Requests Handling
        if ($request_method = 'OPTIONS') {
            return 204;
        }

        # 1. Auth Service Reverse Proxy Routing
        location /api/v1/auth {
            proxy_pass http://auth-service:8001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 2. Patient Service Reverse Proxy Routing
        location /api/v1/patients {
            proxy_pass http://patient-service:8002;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 3. Staff Service Reverse Proxy Routing
        location /api/v1/staff {
            proxy_pass http://staff-service:8003;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 4. Inventory & Razorpay Service Reverse Proxy Routing
        location /api/v1/inventory {
            proxy_pass http://inventory-service:8004;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Root Fallback Landing info
        location / {
            return 200 '{"message": "VectorHMS Reverse Proxy API Gateway Active", "system": "Vector Hospital Management System", "version": "1.0.0", "endpoints": {"auth_service": {"prefix": "/api/v1/auth", "routes": {"GET /api/v1/auth": "Retrieve status & metadata", "POST /api/v1/auth/register": "Register staff credentials & get access token", "POST /api/v1/auth/login": "Authenticate credentials & get access token", "GET /api/v1/auth/verify": "Validate user session state via JWT Header"}}, "patient_service": {"prefix": "/api/v1/patients", "routes": {"GET /api/v1/patients": "List all registered patient admissions", "POST /api/v1/patients": "Register a new clinical admission", "PUT /api/v1/patients/{patient_id}/assign": "Assign patient case to staff member", "PUT /api/v1/patients/{patient_id}/unassign": "Release/unassign patient from staff care roster", "DELETE /api/v1/patients/{patient_id}": "Discharge patient and remove admission profile"}}, "staff_service": {"prefix": "/api/v1/staff", "routes": {"GET /api/v1/staff": "Retrieve entire medical staff directory", "POST /api/v1/staff": "Register/enroll new personnel profile", "DELETE /api/v1/staff/{staff_id}": "De-register / remove personnel from credentials"}}, "inventory_service": {"prefix": "/api/v1/inventory", "routes": {"GET /api/v1/inventory": "List active stocks & instruments catalog", "POST /api/v1/inventory": "Register a new supply item in ledger", "DELETE /api/v1/inventory/{item_name}": "Remove supply item from ledger", "POST /api/v1/inventory/order/create": "Generate Razorpay Order ID for supply purchase", "POST /api/v1/inventory/order/verify": "Verify signature and record successful checkout", "GET /api/v1/inventory/orders": "Retrieve verified paid ledger log history"}}}}';
        }
    }
}
